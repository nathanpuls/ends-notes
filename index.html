<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ends.at</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism-themes/1.9.0/prism-one-light.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <button id="primary-action-button" class="primary-action-btn" type="button" aria-label="Publish" aria-describedby="primary-action-tooltip"></button>
    <div id="primary-action-tooltip" class="action-tooltip" role="tooltip">Publish</div>
    <button id="scroll-top-button" class="scroll-top-btn" type="button" aria-label="Scroll to top">
        <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <path d="M4.75 12.25 10 7l5.25 5.25" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
        </svg>
    </button>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <div class="menu-wrap">
        <button id="menu-button" class="menu-btn" type="button" aria-expanded="false" aria-controls="action-menu" aria-label="Menu">
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <circle cx="10" cy="4.25" r="1.5" fill="currentColor"></circle>
                <circle cx="10" cy="10" r="1.5" fill="currentColor"></circle>
                <circle cx="10" cy="15.75" r="1.5" fill="currentColor"></circle>
            </svg>
        </button>
        <div class="menu-tooltip" role="tooltip">Menu</div>

        <div id="action-menu" class="menu-panel" role="menu">
            <button class="menu-item" type="button" role="menuitem" data-action="new">New page</button>
            <button class="menu-item" type="button" role="menuitem" data-action="duplicate">Duplicate</button>
            <button class="menu-item" type="button" role="menuitem" data-action="copy-link">Copy Link</button>
            <button class="menu-item" type="button" role="menuitem" data-action="copy-markdown">Copy Markdown</button>
            <button class="menu-item" type="button" role="menuitem" data-action="copy-text">Copy Text</button>
            <button class="menu-item color-toggle" type="button" role="menuitem" data-action="toggle-color" aria-expanded="false" aria-controls="color-options">Color</button>
            <div id="color-options" class="color-options" role="group" aria-label="Color choices">
                <button class="menu-item color-option" type="button" role="menuitem" data-action="set-color" data-color="slate"><span class="color-swatch" style="--swatch: #6b7280"></span>Slate</button>
                <button class="menu-item color-option" type="button" role="menuitem" data-action="set-color" data-color="sage"><span class="color-swatch" style="--swatch: #6f9277"></span>Sage</button>
                <button class="menu-item color-option" type="button" role="menuitem" data-action="set-color" data-color="rose"><span class="color-swatch" style="--swatch: #b77986"></span>Rose</button>
                <button class="menu-item color-option" type="button" role="menuitem" data-action="set-color" data-color="sky"><span class="color-swatch" style="--swatch: #3f78a8"></span>Sky</button>
                <button class="menu-item color-option" type="button" role="menuitem" data-action="set-color" data-color="lavender"><span class="color-swatch" style="--swatch: #7664a8"></span>Lavender</button>
                <button class="menu-item color-option" type="button" role="menuitem" data-action="set-color" data-color="amber"><span class="color-swatch" style="--swatch: #a9803a"></span>Amber</button>
            </div>
            <button class="menu-item" type="button" role="menuitem" data-action="sheet">Google Sheet</button>
            <button class="menu-item" type="button" role="menuitem" data-action="about">About</button>
            <button class="menu-item" type="button" role="menuitem" data-action="home">Home</button>
        </div>
    </div>

    <div id="shell" class="app-shell">
        <section class="pane pane-editor">
            <textarea id="markdown-input" spellcheck="false" placeholder="# Title"></textarea>
        </section>

        <section class="pane pane-preview">
            <article id="preview" class="preview-content"></article>
        </section>
    </div>

    <script src="/app.js"></script>
</body>

</html>
