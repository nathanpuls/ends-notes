<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ends.at</title>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-markup.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism-themes/1.9.0/prism-one-light.min.css" rel="stylesheet" />

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #ffffff;
            color: #111827;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        .app-shell {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
            visibility: hidden;
        }

        .app-shell.ready {
            visibility: visible;
        }

        .pane {
            min-width: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .pane-editor {
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
        }

        #markdown-input {
            width: 100%;
            height: 100vh;
            padding: 28px 40px 40px;
            border: none;
            resize: none;
            outline: none;
            background: transparent;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 16px;
            line-height: 1.6;
            color: #111827;
        }

        .preview-content {
            max-width: 720px;
            margin: 0 auto;
            padding: 28px 20px 80px;
            font-size: 16px;
            line-height: 1.72;
        }

        .preview-content h1 {
            font-size: 32px;
            margin: 0 0 28px;
            font-weight: 700;
            line-height: 1.2;
        }

        .preview-content h2 {
            font-size: 24px;
            margin: 52px 0 18px;
            font-weight: 650;
            line-height: 1.25;
        }

        .preview-content h3 {
            font-size: 20px;
            margin: 36px 0 14px;
            font-weight: 650;
            line-height: 1.3;
        }

        .preview-content p,
        .preview-content li {
            font-size: 17px;
            margin: 0 0 16px;
        }

        .preview-content ul,
        .preview-content ol {
            margin: 0 0 20px;
            padding-left: 1.5rem;
        }

        .preview-content a {
            color: inherit;
            text-decoration: underline;
            text-decoration-color: #111827;
            text-underline-offset: 4px;
        }

        .preview-content blockquote {
            margin: 24px 0;
            padding: 0 0 0 16px;
            border-left: 3px solid #e5e7eb;
            color: #4b5563;
        }

        .preview-content blockquote p {
            margin-bottom: 0;
        }

        /* Inline code only */
        .preview-content code:not(pre code) {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.92em;
            background: #f3f4f6;
            color: #111827;
            border-radius: 5px;
            padding: 0.2em 0.4em;
        }

        /* Code block container */
        .preview-content pre {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            padding: 1.25rem;
            margin: 1.5rem 0;
            overflow-x: auto;
        }

        /* Code inside blocks */
        .preview-content pre code {
            background: transparent;
            padding: 0;
            border-radius: 0;
            color: inherit;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .preview-content table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin: 24px 0;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            font-size: 15px;
        }

        .preview-content th,
        .preview-content td {
            padding: 10px 12px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        .preview-content th {
            background: #f9fafb;
            font-weight: 650;
        }

        .preview-content tr:last-child td {
            border-bottom: none;
        }

        .preview-content img {
            border-radius: 12px;
            margin: 20px 0;
            max-width: 100%;
            height: auto;
            display: block;
        }

        .preview-content hr {
            border: 0;
            border-top: 1px solid #e5e7eb;
            margin: 36px 0;
        }

        .menu-wrap {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 1000;
        }

        .menu-btn {
            background: #ffffff;
            color: #111827;
            border: 1px solid #d1d5db;
            width: 38px;
            height: 38px;
            padding: 0;
            border-radius: 999px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 18px rgba(17, 24, 39, 0.08);
        }

        .menu-btn:hover {
            background: #f9fafb;
        }

        .menu-btn svg {
            width: 18px;
            height: 18px;
        }

        .menu-panel {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: 200px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 18px 45px rgba(17, 24, 39, 0.14);
            padding: 8px;
            display: none;
        }

        .menu-panel.open {
            display: block;
        }

        .menu-item {
            width: 100%;
            border: none;
            background: transparent;
            color: #111827;
            text-align: left;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }

        .menu-item:hover {
            background: #f9fafb;
        }

        .menu-item[disabled] {
            color: #9ca3af;
            cursor: default;
        }

        .menu-item[disabled]:hover {
            background: transparent;
        }

        body.publish-mode .pane-editor {
            display: none;
        }

        body.publish-mode .app-shell {
            grid-template-columns: 1fr;
        }

        @media (max-width: 900px) {
            .app-shell {
                grid-template-columns: 1fr;
            }

            .pane-editor {
                border-right: none;
                border-bottom: 1px solid #e5e7eb;
                height: 50vh;
            }

            #markdown-input {
                height: 100%;
                padding: 20px;
            }

            .preview-content {
                padding-top: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="menu-wrap">
        <button id="menu-button" class="menu-btn" type="button" aria-expanded="false" aria-controls="action-menu" aria-label="Menu">
            <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <circle cx="10" cy="4.25" r="1.5" fill="currentColor"></circle>
                <circle cx="10" cy="10" r="1.5" fill="currentColor"></circle>
                <circle cx="10" cy="15.75" r="1.5" fill="currentColor"></circle>
            </svg>
        </button>

        <div id="action-menu" class="menu-panel" role="menu">
            <button class="menu-item" type="button" role="menuitem" data-action="new">Create New Page</button>
            <button class="menu-item" type="button" role="menuitem" data-action="copy-markdown">Copy Markdown</button>
            <button class="menu-item" type="button" role="menuitem" data-action="copy-text">Copy Text</button>
            <button class="menu-item" type="button" role="menuitem" data-action="publish">Publish</button>
            <button class="menu-item" type="button" role="menuitem" data-action="edit">Edit</button>
        </div>
    </div>

    <div id="shell" class="app-shell">
        <section class="pane pane-editor">
            <textarea id="markdown-input" spellcheck="false" placeholder="Start typing..."></textarea>
        </section>

        <section class="pane pane-preview">
            <article id="preview" class="preview-content"></article>
        </section>
    </div>

    <script>
        marked.setOptions({
            gfm: true,
            breaks: true
        });

        const shell = document.getElementById("shell");
        const input = document.getElementById("markdown-input");
        const preview = document.getElementById("preview");
        const menuButton = document.getElementById("menu-button");
        const menuPanel = document.getElementById("action-menu");
        const menuItems = Array.from(document.querySelectorAll(".menu-item"));

        function render() {
            preview.innerHTML = marked.parse(input.value || "");

            // Only highlight fenced code blocks, never inline code.
            document
                .querySelectorAll('.preview-content pre code[class*="language-"]')
                .forEach((block) => {
                    Prism.highlightElement(block);
                });

            if (!document.body.classList.contains("publish-mode")) {
                localStorage.setItem("md-draft", input.value);
            }
        }

        function getPublishedIdFromPath() {
            const match = window.location.pathname.match(/^\/p\/([A-Za-z0-9_-]+)$/);
            return match ? match[1] : null;
        }

        function getEditorPath() {
            return window.location.protocol === "file:" ? window.location.pathname : "/";
        }

        async function publishCurrentMarkdown() {
            const markdown = input.value.trim();

            if (!markdown) {
                return;
            }

            setMenuBusy(true, "Publishing...");

            try {
                const response = await fetch("/api/publish", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ markdown })
                });

                if (!response.ok) {
                    throw new Error("Publish failed");
                }

                const data = await response.json();

                if (navigator.clipboard?.writeText) {
                    await navigator.clipboard.writeText(data.url);
                }

                window.location.href = data.url;
            } catch (error) {
                console.error(error);
                setMenuBusy(false);
                alert("Could not publish this Markdown.");
            }
        }

        function startEditingPublishedPage() {
            localStorage.setItem("md-draft", input.value);
            window.location.href = "/";
        }

        function createNewPage() {
            localStorage.removeItem("md-draft");
            input.value = "";
            document.body.classList.remove("publish-mode");
            window.history.replaceState({}, "", getEditorPath());
            render();
            syncMenuState();
            input.focus();
        }

        async function copyMarkdown() {
            await navigator.clipboard.writeText(input.value);
        }

        async function copyText() {
            await navigator.clipboard.writeText(preview.innerText || "");
        }

        function setMenuBusy(isBusy) {
            menuButton.disabled = isBusy;
            menuButton.innerHTML = isBusy
                ? `<svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <circle cx="10" cy="4.25" r="1.5" fill="currentColor"></circle>
                <circle cx="10" cy="10" r="1.5" fill="currentColor"></circle>
                <circle cx="10" cy="15.75" r="1.5" fill="currentColor"></circle>
            </svg>`
                : `<svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
                <circle cx="10" cy="4.25" r="1.5" fill="currentColor"></circle>
                <circle cx="10" cy="10" r="1.5" fill="currentColor"></circle>
                <circle cx="10" cy="15.75" r="1.5" fill="currentColor"></circle>
            </svg>`;
        }

        function setMenuOpen(isOpen) {
            menuPanel.classList.toggle("open", isOpen);
            menuButton.setAttribute("aria-expanded", isOpen ? "true" : "false");
        }

        function syncMenuState() {
            const isPublishMode = document.body.classList.contains("publish-mode");
            const editItem = menuItems.find((item) => item.dataset.action === "edit");
            editItem.disabled = !isPublishMode;
        }

        async function handleMenuAction(action) {
            setMenuOpen(false);

            if (action === "new") {
                createNewPage();
                return;
            }

            if (action === "copy-markdown") {
                await copyMarkdown();
                return;
            }

            if (action === "copy-text") {
                await copyText();
                return;
            }

            if (action === "publish") {
                await publishCurrentMarkdown();
                return;
            }

            if (action === "edit" && document.body.classList.contains("publish-mode")) {
                startEditingPublishedPage();
            }
        }

        async function checkUrl() {
            const publishedId = getPublishedIdFromPath();

            if (publishedId) {
                try {
                    const response = await fetch(`/api/doc/${publishedId}`);

                    if (!response.ok) {
                        throw new Error("Document not found");
                    }

                    const data = await response.json();
                    input.value = data.markdown || "";
                    document.body.classList.add("publish-mode");
                    render();
                } catch (error) {
                    console.error(error);
                    preview.innerHTML = "<p class='preview-empty'>This published Markdown could not be loaded.</p>";
                    document.body.classList.add("publish-mode");
                }
            } else {
                document.body.classList.remove("publish-mode");

                const draft = localStorage.getItem("md-draft");

                if (draft && !input.value) {
                    input.value = draft;
                }

                render();
            }

            setMenuBusy(false);
            syncMenuState();
            shell.classList.add("ready");
        }

        input.addEventListener("input", render);
        menuButton.addEventListener("click", () => {
            setMenuOpen(!menuPanel.classList.contains("open"));
        });
        menuItems.forEach((item) => {
            item.addEventListener("click", async () => {
                if (item.disabled) {
                    return;
                }

                await handleMenuAction(item.dataset.action);
            });
        });
        document.addEventListener("click", (event) => {
            if (!event.target.closest(".menu-wrap")) {
                setMenuOpen(false);
            }
        });
        document.addEventListener("keydown", (event) => {
            if (event.key === "Escape") {
                setMenuOpen(false);
            }
        });
        window.onload = checkUrl;
        window.onpopstate = checkUrl;
    </script>
</body>

</html>
